<svg width="600" height="330" viewBox="0 0 600 330" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6B9D"/>
      <stop offset="50%" stop-color="#C86DD7"/>
      <stop offset="100%" stop-color="#4D96FF"/>
    </linearGradient>
    <style>
      text{font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif;fill:#e6e6e6;}
      .pct{font-family:'Fira Code',monospace;fill:#FFC75F;font-size:13px;}
    </style>
  </defs>

  <rect width="600" height="330" fill="#0d1117" rx="14"/>

  <!-- row template: label y, bar y -->
  <!-- JavaScript 90% -->
  <text x="24" y="34" font-size="15" font-weight="600">JavaScript</text>
  <text x="562" y="34" class="pct" text-anchor="end">90%</text>
  <rect x="24" y="42" width="552" height="10" rx="5" fill="#161b22"/>
  <rect x="24" y="42" height="10" rx="5" fill="url(#barGrad)">
    <animate attributeName="width" from="0" to="497" dur="1.4s" fill="freeze"/>
  </rect>

  <!-- React JS / React Native 88% -->
  <text x="24" y="84" font-size="15" font-weight="600">React JS / React Native</text>
  <text x="562" y="84" class="pct" text-anchor="end">88%</text>
  <rect x="24" y="92" width="552" height="10" rx="5" fill="#161b22"/>
  <rect x="24" y="92" height="10" rx="5" fill="url(#barGrad)">
    <animate attributeName="width" from="0" to="486" dur="1.4s" begin="0.15s" fill="freeze"/>
  </rect>

  <!-- Tailwind CSS 85% -->
  <text x="24" y="134" font-size="15" font-weight="600">Tailwind CSS</text>
  <text x="562" y="134" class="pct" text-anchor="end">85%</text>
  <rect x="24" y="142" width="552" height="10" rx="5" fill="#161b22"/>
  <rect x="24" y="142" height="10" rx="5" fill="url(#barGrad)">
    <animate attributeName="width" from="0" to="469" dur="1.4s" begin="0.3s" fill="freeze"/>
  </rect>

  <!-- HTML / CSS 92% -->
  <text x="24" y="184" font-size="15" font-weight="600">HTML / CSS</text>
  <text x="562" y="184" class="pct" text-anchor="end">92%</text>
  <rect x="24" y="192" width="552" height="10" rx="5" fill="#161b22"/>
  <rect x="24" y="192" height="10" rx="5" fill="url(#barGrad)">
    <animate attributeName="width" from="0" to="508" dur="1.4s" begin="0.45s" fill="freeze"/>
  </rect>

  <!-- MongoDB 70% -->
  <text x="24" y="234" font-size="15" font-weight="600">MongoDB</text>
  <text x="562" y="234" class="pct" text-anchor="end">70%</text>
  <rect x="24" y="242" width="552" height="10" rx="5" fill="#161b22"/>
  <rect x="24" y="242" height="10" rx="5" fill="url(#barGrad)">
    <animate attributeName="width" from="0" to="386" dur="1.4s" begin="0.6s" fill="freeze"/>
  </rect>

  <!-- Java 65% -->
  <text x="24" y="284" font-size="15" font-weight="600">Java</text>
  <text x="562" y="284" class="pct" text-anchor="end">65%</text>
  <rect x="24" y="292" width="552" height="10" rx="5" fill="#161b22"/>
  <rect x="24" y="292" height="10" rx="5" fill="url(#barGrad)">
    <animate attributeName="width" from="0" to="359" dur="1.4s" begin="0.75s" fill="freeze"/>
  </rect>
</svg>
