<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="45%">
        <animate attributeName="stop-color" values="#1a0f2e;#2a1240;#1a0f2e" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>

    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6B9D"/>
      <stop offset="50%" stop-color="#C86DD7"/>
      <stop offset="100%" stop-color="#4D96FF"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="300" fill="url(#bgGrad)"/>

  <!-- floating particles (decorative only, safe even without animation) -->
  <circle cx="1020" cy="60" r="3" fill="#FFC75F" opacity="0.8">
    <animate attributeName="cy" values="60;40;60" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1080" cy="120" r="4" fill="#FF6B9D" opacity="0.7">
    <animate attributeName="cy" values="120;95;120" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="940" cy="220" r="2.5" fill="#4D96FF" opacity="0.75">
    <animate attributeName="cy" values="220;195;220" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1140" cy="250" r="3.5" fill="#C86DD7" opacity="0.7">
    <animate attributeName="cy" values="250;225;250" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1170" cy="90" r="2" fill="#FFC75F" opacity="0.6">
    <animate attributeName="cy" values="90;70;90" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1000" cy="270" r="2.5" fill="#FF6B9D" opacity="0.5">
    <animate attributeName="cy" values="270;250;270" dur="5.5s" repeatCount="indefinite"/>
  </circle>

  <!-- name (always visible, no reveal gate) -->
  <text x="50" y="130" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="56" font-weight="800" fill="url(#nameGrad)">
    Mohid S
  </text>

  <!-- role line -->
  <text x="52" y="168" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="600" fill="#e6e6e6">
    Software Developer &#8226; React JS &#8226; React Native &#8226; JavaScript
  </text>

  <!-- tagline chip -->
  <rect x="50" y="190" width="430" height="38" rx="19" fill="#161b22" stroke="#FFC75F" stroke-width="1.2"/>
  <text x="72" y="215" font-family="'Fira Code',monospace" font-size="15" fill="#FFC75F">3+ years shipping real web &amp; mobile apps</text>

  <!-- bottom accent line -->
  <rect x="0" y="294" width="1200" height="6" fill="url(#nameGrad)"/>
</svg>
